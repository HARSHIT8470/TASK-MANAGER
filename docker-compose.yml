version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: taskflow_mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskmanager

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow_server
    restart: always
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taskmanager
      JWT_SECRET: change_this_in_production_secret_key
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow_client
    restart: always
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo_data:
